name: CI

# Runs the test suite and executes the example notebooks. Only active once this repo is
# pushed to GitHub (pushing is deferred per project decision); the same commands run locally:
#   pip install -r requirements.txt
#   pytest tests/ -q
#   pytest --nbmake examples/ -q
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit + characterization tests
        run: pytest tests/ -q
      - name: Execute example notebooks
        run: pytest --nbmake examples/ -q --nbmake-timeout=900
