name: CI

# DORMANT until BOTH conditions hold (see README "License & data"):
#   1. a GitHub remote exists, AND
#   2. the HCP connectome redistribution terms are confirmed, or data/connectomes/ is removed /
#      made CI-optional -- this workflow executes notebooks that read data/connectomes/scale83.
# Until then, run the identical gate locally:  python scripts/local_ci.py
#
# Determinism: BLAS threads are pinned to 1 so reduction order is stable (the `golden`
# characterization tests compare float32 accumulated trajectories). The bit-frozen `golden`
# tests run as a SEPARATE step so a cross-platform numeric drift there cannot mask a real
# failure in the portable suite; if Linux ever drifts past 1e-6, re-baseline on the runner with
# `python tests/regen_goldens.py` (the RNG-drawn goldens are platform-stable; only the
# BLAS/tanh-derived ones can move).
on:
  push:
    branches: [main]
  pull_request:

env:
  OMP_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  PYTHONHASHSEED: "0"

jobs:
  test:
    runs-on: ubuntu-24.04   # pinned (not -latest) so the BLAS/libm stack does not shift silently
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Fresh-install smoke check
        run: python -c "import reservoirs, slither, reservoirs.learning, reservoirs.baselines, reservoirs.tasks, reservoirs.tuning; print('imports OK')"
      - name: Portable suite (cross-platform gate)
        run: pytest tests/ -m "not golden" -q
      - name: Golden characterization (single-platform regression gate)
        run: pytest tests/ -m golden -q
      - name: Execute example notebook(s)
        run: pytest --nbmake examples/ -q --nbmake-timeout=900
